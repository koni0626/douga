name: douga

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: douga
      POSTGRES_USER: douga
      POSTGRES_PASSWORD: douga-local-only
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U douga -d douga"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.8.0-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  s3:
    image: localstack/localstack:2026.6.1
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: ap-northeast-1
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -fs http://localhost:4566/_localstack/health | grep ''"s3": "available"''',
        ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  redis-data:
  localstack-data:
