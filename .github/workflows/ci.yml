name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_DB: douga_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d douga_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      APP_SECRET_KEY: ci-only-secret-key-with-at-least-32-characters
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/douga_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/douga_test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.14"
      - run: pnpm install --frozen-lockfile
      - run: uv sync --all-packages --all-groups --frozen
      - run: pnpm generate
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: uv run ruff check apps/backend
      - run: uv run mypy apps/backend/src apps/backend/tests
      - run: uv run alembic -c apps/backend/alembic.ini upgrade head
      - run: uv run pytest --cov=apps/backend/src --cov-report=term-missing
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: pnpm audit --audit-level high
      - run: uvx pip-audit
